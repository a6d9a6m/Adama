groups:
  - name: adama-core-alerts
    rules:
      - alert: SeckillOrderErrorRateHigh
        expr: |
          (
            sum(rate(server_requests_code_total{operation=~".*CreateAdamaOrder.*", code!~"2.."}[5m]))
            /
            clamp_min(sum(rate(server_requests_code_total{operation=~".*CreateAdamaOrder.*"}[5m])), 1)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Seckill order error rate is high"
          description: "CreateAdamaOrder error rate has exceeded 20 percent for 5 minutes."

      - alert: KafkaConsumerLagHigh
        expr: sum(kafka_consumergroup_lag) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Kafka consumer lag has remained above 100 for 10 minutes."

      - alert: TaskFailuresHigh
        expr: increase(adama_task_job_runs_total{result="failed"}[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Scheduled task failures detected"
          description: "There has been at least one failed scheduled task in the last 10 minutes."

      - alert: RedisUnavailable
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unavailable"
          description: "Prometheus cannot scrape Redis exporter metrics."

      - alert: MySQLUnavailable
        expr: up{job="mysql"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "MySQL is unavailable"
          description: "Prometheus cannot scrape MySQL exporter metrics."
