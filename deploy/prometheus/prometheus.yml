global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "user"
    metrics_path: /metrics
    static_configs:
      - targets: ["user:8000"]

  - job_name: "goods"
    metrics_path: /metrics
    static_configs:
      - targets: ["goods:8003"]

  - job_name: "order"
    metrics_path: /metrics
    static_configs:
      - targets: ["order:8001"]

  - job_name: "task"
    metrics_path: /metrics
    static_configs:
      - targets: ["task:8004"]

  - job_name: "mysql"
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
