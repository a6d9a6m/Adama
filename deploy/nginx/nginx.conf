worker_processes  auto;

events {
  worker_connections  4096;
}

http {
  map $http_x_user_id $seckill_limit_key {
    default $http_x_user_id;
    "" $binary_remote_addr;
  }

  limit_req_zone $seckill_limit_key zone=seckill_token:10m rate=800r/s;
  limit_req_zone $seckill_limit_key zone=seckill_order:10m rate=400r/s;
  limit_req_status 503;

  upstream gateway_upstream {
    server gateway:8080;
    keepalive 64;
  }

  upstream ops_ai_upstream {
    server ops-ai:8088;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    location = /nginx_status {
      stub_status;
      access_log off;
    }

    location ~ ^/api/v1/adama/goods/[0-9]+$ {
      limit_req zone=seckill_token burst=800 nodelay;
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    location = /api/v1/adama/order {
      limit_req zone=seckill_order burst=400 nodelay;
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    location /api/v1/adama/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    location /ops-ai/ {
      proxy_pass http://ops_ai_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }
  }
}
