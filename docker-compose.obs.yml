services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: adama-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - adama

  grafana:
    image: grafana/grafana:10.4.5
    container_name: adama-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    networks:
      - adama

networks:
  adama:
    external: true
