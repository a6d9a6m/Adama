services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: adama-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - adama

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: adama-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - adama

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: adama-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - adama

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: adama-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
    networks:
      - adama

  etcd:
    image: ${ETCD_IMAGE:-registry.k8s.io/etcd:3.5.21-0}
    container_name: adama-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --name=adama-etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    ports:
      - "2379:2379"
    networks:
      - adama

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: adama-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
    networks:
      - adama

  dtm:
    image: yedf/dtm:1.18
    container_name: adama-dtm
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      STORE_DRIVER: mysql
      STORE_HOST: mysql
      STORE_PORT: 3306
      STORE_USER: root
      STORE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@123456}
      STORE_DB: dtm_barrier
    ports:
      - "8085:36789"
    networks:
      - adama

  user:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-user
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    working_dir: /workspace
    command: sh -lc "go run ./app/user/service/cmd/server -conf ./deploy/configs/user.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      ETCD_ENDPOINTS: etcd:2379
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    ports:
      - "8000:8000"
      - "9000:9000"
    networks:
      - adama

  goods:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-goods
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - dtm
    working_dir: /workspace
    command: sh -lc "go run ./app/goods/service/cmd/server -conf ./deploy/configs/goods.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      DTM_SERVER_URL: http://dtm:36789/api/dtmsvr
      GOODS_SERVICE_URL: http://goods:8003
      ORDER_SERVICE_URL: http://order:8001
      GOODS_DB_MAX_OPEN_CONNS: 32
      GOODS_DB_MAX_IDLE_CONNS: 12
      DTM_DB_HOST: mysql
      DTM_DB_PORT: "3306"
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    ports:
      - "8003:8003"
      - "9003:9003"
    networks:
      - adama

  order:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-order
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - kafka
      - etcd
      - user
      - goods
      - dtm
    working_dir: /workspace
    command: sh -lc "go run ./app/order/service/cmd/server -conf ./deploy/configs/order.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      ETCD_ENDPOINTS: etcd:2379
      USER_GRPC_ENDPOINT: user:9000
      DTM_SERVER_URL: http://dtm:36789/api/dtmsvr
      GOODS_SERVICE_URL: http://goods:8003
      ORDER_SERVICE_URL: http://order:8001
      ORDER_DB_MAX_OPEN_CONNS: 32
      ORDER_DB_MAX_IDLE_CONNS: 12
      ORDER_DISPATCH_COMPENSATE_TIMEOUT: 3s
      ORDER_MARK_SYNC_TIMEOUT: 2s
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    ports:
      - "8001:8001"
      - "9001:9001"
    networks:
      - adama

  task-worker:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-task-worker
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - kafka
      - order
      - goods
      - dtm
    working_dir: /workspace
    command: sh -lc "go run ./app/job/service/cmd/server -conf ./deploy/configs/job.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      JOB_ROLE: worker
      KAFKA_BROKERS: kafka:9092
      TASK_KAFKA_CONSUMERS: 8
      TASK_KAFKA_WORKERS: 12
      TASK_KAFKA_QUEUE_SIZE: 1280
      TASK_KAFKA_MAX_RETRIES: 3
      TASK_KAFKA_PUBLISH_TIMEOUT: 3s
      TASK_DB_MAX_OPEN_CONNS: 36
      TASK_DB_MAX_IDLE_CONNS: 12
      TASK_REPAIR_LIMIT: 100
      TASK_TIMEOUT_CLOSE_LIMIT: 200
      TASK_STOCK_CHECK_LIMIT: 100
      GOODS_CANCEL_URL: http://goods:8003/internal/orders/cancel
      DTM_SERVER_URL: http://dtm:36789/api/dtmsvr
      GOODS_SERVICE_URL: http://goods:8003
      ORDER_SERVICE_URL: http://order:8001
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    networks:
      - adama

  task-timeout:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-task-timeout
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - order
      - goods
    working_dir: /workspace
    command: sh -lc "go run ./app/job/service/cmd/server -conf ./deploy/configs/job.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      JOB_ROLE: timeout
      TASK_DB_MAX_OPEN_CONNS: 8
      TASK_DB_MAX_IDLE_CONNS: 4
      TASK_TIMEOUT_CLOSE_LIMIT: 200
      GOODS_CANCEL_URL: http://goods:8003/internal/orders/cancel
      DTM_SERVER_URL: http://dtm:36789/api/dtmsvr
      GOODS_SERVICE_URL: http://goods:8003
      ORDER_SERVICE_URL: http://order:8001
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    networks:
      - adama

  task-scheduler:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-task-scheduler
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - order
      - goods
      - dtm
    working_dir: /workspace
    command: sh -lc "go run ./app/job/service/cmd/server -conf ./deploy/configs/job.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      JOB_ROLE: scheduler
      TASK_DB_MAX_OPEN_CONNS: 8
      TASK_DB_MAX_IDLE_CONNS: 4
      TASK_REPAIR_LIMIT: 100
      TASK_STOCK_CHECK_LIMIT: 100
      GOODS_CANCEL_URL: http://goods:8003/internal/orders/cancel
      DTM_SERVER_URL: http://dtm:36789/api/dtmsvr
      GOODS_SERVICE_URL: http://goods:8003
      ORDER_SERVICE_URL: http://order:8001
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    networks:
      - adama

  gateway:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-gateway
    restart: unless-stopped
    depends_on:
      - user
      - goods
      - order
    working_dir: /workspace
    command: sh -lc "go run ./app/gateway/cmd/server -conf ./deploy/configs/gateway.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    ports:
      - "8080:8080"
    networks:
      - adama

  ops-ai:
    image: ${ADAMA_GO_IMAGE:-mcr.microsoft.com/devcontainers/go:1.25-trixie}
    container_name: adama-ops-ai
    restart: unless-stopped
    depends_on:
      - mysql
    working_dir: /workspace
    command: sh -lc "go run ./app/ops-ai/cmd/server -conf ./deploy/configs/ops-ai.compose.yaml"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      GO111MODULE: "on"
      GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.org}
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    ports:
      - "8088:8088"
    networks:
      - adama

  nginx:
    image: nginx:1.25-alpine
    container_name: adama-nginx
    restart: unless-stopped
    depends_on:
      - gateway
      - ops-ai
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - adama

volumes:
  mysql_data:
  redis_data:
  go_mod_cache:
  go_build_cache:

networks:
  adama:
    name: adama
