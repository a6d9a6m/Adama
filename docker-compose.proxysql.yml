services:
  user:
    environment:
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-Root@123456}@tcp(proxysql:6033)/user?parseTime=true

  goods:
    environment:
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-Root@123456}@tcp(proxysql:6033)/goods?parseTime=true

  order:
    environment:
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-Root@123456}@tcp(proxysql:6033)/order?parseTime=true

  task:
    environment:
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-Root@123456}@tcp(proxysql:6033)/order?parseTime=true

  ops-ai:
    environment:
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-Root@123456}@tcp(proxysql:6033)/order?parseTime=true

  mysql-replica:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: adama-mysql-replica
    command:
      - --default-authentication-plugin=mysql_native_password
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=1
      - --skip-log-bin=0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@123456}
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./deploy/mysql/replica:/docker-entrypoint-initdb.d:ro
    networks:
      - adama

  proxysql:
    image: proxysql/proxysql:2.6.2
    container_name: adama-proxysql
    depends_on:
      - mysql
      - mysql-replica
    ports:
      - "6033:6033"
      - "6032:6032"
    volumes:
      - ./deploy/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    networks:
      - adama

volumes:
  mysql_replica_data:

networks:
  adama:
    external: true
